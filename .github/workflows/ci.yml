name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        run: pip install -e ".[agent,api,dev]"

      - name: Unit tests
        run: pytest -q
        env:
          # Keep tests offline / deterministic
          OPENAI_API_KEY: ""
          ANTHROPIC_API_KEY: ""

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package.json

      - name: Build frontend
        working-directory: web
        run: |
          npm install
          npm run build

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t rolegrep:ci .
